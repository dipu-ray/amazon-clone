<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Character Encoding & Browser Compatibility -->
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Primary SEO Metadata -->
    <title>Amazon.com. Spend less. Smile more.</title>
    <meta name="description"
        content="Shop Amazon clones for electronics, fashion, home decor, and more online. A frontend HTML, CSS, and Bootstrap practice project mimicking the ultimate e-commerce experience.">
    <meta name="keywords"
        content="Amazon Clone, HTML CSS project, Bootstrap e-commerce, frontend development, online shopping UI, responsive web design, portfolio project">
    <meta name="author" content="Dipu Ray">
    <meta name="robots" content="index, follow">

    <!-- Favicon -->
    <link rel="shortcut icon" href="assets/images/icon.png" type="image/x-icon">

    <!-- Google "Noto Sans" Fonts Links -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <!-- Bootstrap CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <!-- External CSS Link -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <header>
        <nav>
            <section class="d-flex align-items-center py-2 top-nav">
                <div class="top-content logo">
                    <a href="#x" class="btn">
                        <img class="w-100" src="assets/images/logo.png" alt="Amazon Logo">
                    </a>
                </div>
                <div class="top-content deliver-btn">
                    <a href="#x" class="btn d-flex align-items-end gap-1 p-0">
                        <div class="text-white fs-6">
                            <i class="bi bi-geo-alt"></i>
                        </div>
                        <div class="d-flex flex-column justify-content-start text-start lh-sm db-content">
                            <div class="text-white-50">Deliver to</div>
                            <div class="text-white fw-bold bd-content">Bangladesh</div>
                        </div>
                    </a>
                </div>
                <div class="ms-4 d-flex align-items-center top-content search-bar">
                    <div class="dropdown">
                        <select name="categories" id="categories">
                            <option value="all">All</option>
                            <option value="all-dept">All Departments</option>
                            <option value="arts-crafts">Arts & Crafts</option>
                            <option value="automotive">Automotive</option>
                            <option value="baby">Baby</option>
                            <option value="beauty">Beauty & Personal Care</option>
                            <option value="books">Books</option>
                            <option value="boys-fashion">Boy's Fashion</option>
                            <option value="computers">Computers</option>
                            <option value="deals">Deals</option>
                            <option value="digital-music">Digital Music</option>
                            <option value="electronics">Electronics</option>
                            <option value="girls-fashion">Girl's Fashion</option>
                            <option value="health-household">Health & Household</option>
                            <option value="home-kitchen">Home & Kitchen</option>
                            <option value="industrial-scientific">Industrial & Scientific</option>
                            <option value="kindle-store">Kindle Store</option>
                            <option value="luggage">Luggage</option>
                            <option value="mens-fashion">Men's Fashion</option>
                            <option value="movies-tv">Movies & TV</option>
                            <option value="music-cds">Music CDs & Vinyl</option>
                        </select>
                    </div>
                    <div class="input">
                        <input type="text" placeholder="Search Amazon" required>
                    </div>
                    <div class="search-icon">
                        <a href="#x" class="bg-warning text-black">
                            <div class="d-flex align-items-center justify-content-center h-100">
                                <i class="bi bi-search fs-5"></i>
                            </div>
                        </a>
                    </div>
                </div>
                <div class="ms-4 top-content lang">
                    <a href="#x" class="btn d-flex align-items-center gap-1 text-white">
                        <img class="w-50 h-50" src="assets/images/flag.png" alt="US Flag">
                        <span class="fw-bold">EN</span>
                        <i class="fa-solid fa-sort-down mb-1 text-white-50"></i>
                    </a>
                </div>
                <div class="top-content">
                    <a href="#x" class="btn fw-semibold d-flex flex-column align-items-start lh-sm">
                        <span class="text-white-50 hello-btn">Hello, sign in</span>
                        <span class="text-white acc-list-btn">Account & Lists</span>
                    </a>
                </div>
            </section>
            <section class="bottom-nav"></section>
        </nav>
    </header>

    <!-- Bootstrap CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
