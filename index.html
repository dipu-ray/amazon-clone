<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Character Encoding & Browser Compatibility -->
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Primary SEO Metadata -->
    <title>Amazon.com. Spend less. Smile more.</title>
    <meta name="description"
        content="Shop Amazon clones for electronics, fashion, home decor, and more online. A frontend HTML, CSS, and Bootstrap practice project mimicking the ultimate e-commerce experience.">
    <meta name="keywords"
        content="Amazon Clone, HTML CSS project, Bootstrap e-commerce, frontend development, online shopping UI, responsive web design, portfolio project">
    <meta name="author" content="Dipu Ray">
    <meta name="robots" content="index, follow">


    <!-- Favicon -->
    <link rel="shortcut icon" href="assets/images/icon.png" type="image/x-icon">

    <!-- Google "Noto Sans" Fonts Links -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Bootstrap CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <!-- External CSS Link -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <header>
        <nav class="navbar navbar-expand-lg bg-black d-flex flex-column p-0">
            <div class="container-fluid top-nav">
                <a class="navbar-brand nav-logo" href="#">
                    <img class="w-100" src="assets/images/logo.png" alt="Amazon Logo">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="d-bd-btn nav-link d-flex align-items-end" aria-current="page" href="#">
                                <i class="bi bi-geo-alt text-white"></i>
                                <div>Deliver to <span>Bangladesh</span></div>
                            </a>
                        </li>
                        <li class="nav-item">
                            <div>
                                <form action="#" method="POST" enctype="multipart/form-data">
                                    <select name="categories" id="categories">
                                        <option value="all">All</option>
                                        <option value="all-dept">All Departments</option>
                                        <option value="opel">Opel</option>
                                        <option value="audi">Audi</option>
                                    </select>
                                </form>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>

            <div class="container-fluid bottom-nav">
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link" aria-current="page" href="#">All</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Today's Deals</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <!-- Bootstrap CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
